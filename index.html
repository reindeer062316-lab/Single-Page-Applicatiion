<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f5ebe0" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>張路晴 luching chang｜個人數位名片</title>
    <meta name="description" content="張路晴 luching chang 的個人數位名片" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="container">
      <div class="profile-photo">
        <img src="./assets/profile.png" alt="張路晴的個人照片" />
      </div>

      <h1 class="name">張路晴 luching chang</h1>
      <p class="subtitle">陽明交通大學生物醫學工程研究所 碩一</p>

      <div class="social-links">
        <a href="https://github.com/" target="_blank" rel="noreferrer" class="social-btn">
          GitHub
        </a>
        <a href="https://www.instagram.com/" target="_blank" rel="noreferrer" class="social-btn">
          Instagram
        </a>
        <button id="introBtn" class="social-btn social-btn--button" type="button">
          自我介紹
        </button>
        <a href="https://www.linkedin.com/" target="_blank" rel="noreferrer" class="social-btn">
          LinkedIn
        </a>
      </div>
    </main>

    <!-- 自我介紹 Modal -->
    <div id="introModal" class="modal" hidden role="dialog" aria-modal="true" aria-label="自我介紹">
      <div class="modal__backdrop" id="modalBackdrop"></div>
      <div class="modal__panel" role="document">
        <button class="modal__back" id="modalBack" type="button" aria-label="返回">
          ← 返回
        </button>
        <div class="modal__content">
          <div class="modal__avatar">
            <img src="./assets/profile.png" alt="" aria-hidden="true" />
          </div>
          <h2 class="modal__name">張路晴 luching chang</h2>
          <p class="modal__school">陽明交通大學生物醫學工程研究所 碩一</p>
          <p class="modal__bio">
            嗨！我是路晴，目前就讀陽明交通大學生醫所。<br />
            對數位健康與創新醫療器材充滿熱情，<br />
            喜歡出去玩、嚕貓、看棒球，也愛嘗試各種新事物。
          </p>
          <a
            href="https://reindeer062316-lab.github.io/Single-Page-Applicatiion/"
            target="_blank"
            rel="noreferrer"
            class="modal__link"
          >
            查看完整個人頁面 →
          </a>
        </div>
      </div>
    </div>

    <div id="pawprints" aria-hidden="true"></div>

    <script src="./main.js"></script>
  </body>
</html>
