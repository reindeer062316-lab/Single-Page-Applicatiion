<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f5ebe0" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>張路晴 luching chang｜個人數位名片</title>
    <meta name="description" content="張路晴 luching chang 的個人數位名片" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="container">
      <div class="profile-photo">
        <img src="./assets/profile.png" alt="張路晴的個人照片" />
      </div>

      <h1 class="name">張路晴 luching chang</h1>
      <p class="subtitle">陽明交通大學生物醫學工程研究所 碩一</p>

      <div class="social-links">
        <a href="https://github.com/" target="_blank" rel="noreferrer" class="social-btn">
          GitHub
        </a>
        <a href="https://www.instagram.com/" target="_blank" rel="noreferrer" class="social-btn">
          Instagram
        </a>
        <button id="introBtn" class="social-btn social-btn--button" type="button">
          自我介紹
        </button>
        <a href="https://www.linkedin.com/" target="_blank" rel="noreferrer" class="social-btn">
          LinkedIn
        </a>
      </div>
    </main>

    <div id="pawprints" aria-hidden="true"></div>

    <!-- 貓咪 gif overlay -->
    <div id="catOverlay" class="cat-overlay" hidden>
      <div class="cat-overlay__backdrop" id="catBackdrop"></div>
      <div class="cat-overlay__box">
        <img src="./cool-fun.gif" alt="Hi!" class="cat-overlay__gif" />
        <button class="cat-overlay__close" id="catClose" type="button">← 返回</button>
      </div>
    </div>

    <script src="./main.js"></script>
  </body>
</html>
